{{ define "main" }}

<article class="container">
  <h1 class="mb-3">{{ .Title }}</h1>

  <p class="text-muted">{{ .Date.Format "Jan 2, 2006" }}</p>

  {{ if .Params.image }}

  <img src="{{ .Params.image }}" class="img-fluid mb-4 rounded" />

  {{ end }}

  <div class="mb-4">{{ .Content }}</div>

  <div class="mt-4">
    <strong>Tags:</strong>

    {{ range .Params.tags }}

    <a class="badge bg-secondary me-1" href="/tags/{{ . | urlize }}">
      {{ . }}
    </a>

    {{ end }}
  </div>

  <div class="mt-3"></div>
</article>

{{ end }}
