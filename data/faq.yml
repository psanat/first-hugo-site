- question: "How do I know if this is the right fit for me?"
  answer: "The best way to determine 'fit' is through a brief discovery call. This allows us to discuss your goals and see if my approach feels supportive for you."

- question: "What happens during the first session?"
  answer: "The initial session is about understanding your story. We will discuss what brings you here, your current challenges, and what you hope to achieve."

- question: "How do I book an appointment?"
  answer: "You can book directly through the **[Book Now]** button on this website. You’ll be able to view real-time availability and select a slot."

- question: "What is your cancellation policy?"
  answer: "I require **24 hours' notice** for cancellations or rescheduling. This allows me to offer the time slot to other clients who may be waiting for an appointment."

- question: "Is everything we discuss confidential?"
  answer: "Absolutely. Your privacy is paramount. Everything shared in our sessions is strictly confidential, except in specific legal circumstances where there is a risk of harm to yourself or others."

- question: "How many sessions will I need?"
  answer: "This varies for everyone. Some clients find clarity in 4–6 sessions, while others prefer ongoing support over several months. We will check in regularly to ensure the pace feels right for you."
